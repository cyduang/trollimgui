name: Build Release

on:
  workflow_dispatch:
  push:
    branches:
      - "**"
    tags:
      - "v*"
      - "v*.*"
      - "v*.*.*"

env:
  XCODE_VERSION: "15.4"

jobs:
  build:
    name: Build TrollStore tipa
    runs-on: macos-14

    steps:
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Install build dependencies
        run: |
          HOMEBREW_NO_AUTO_UPDATE=1 HOMEBREW_NO_INSTALLED_DEPENDENTS_CHECK=1 brew install dpkg make libplist openssl@3 ldid-procursus
          echo "/usr/local/opt/make/libexec/gnubin" >> $GITHUB_PATH

      - name: Checkout project
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Checkout theos
        uses: actions/checkout@v4
        with:
          repository: theos/theos
          path: theos
          submodules: recursive

      - name: Checkout theos SDKs
        uses: actions/checkout@v4
        with:
          repository: theos/sdks
          ref: master
          path: theos/sdks

      - name: Setup environment
        run: |
          rm -rf $GITHUB_WORKSPACE/theos/sdks/.git
          echo "THEOS=$GITHUB_WORKSPACE/theos" >> $GITHUB_ENV
          echo "FINALPACKAGE=1" >> $GITHUB_ENV
          chmod +x get-version.sh gen-control.sh
          echo "PKG_VERSION=$(./get-version.sh)" >> $GITHUB_ENV
          echo "Available SDKs: $(find $GITHUB_WORKSPACE/theos/sdks -maxdepth 1 -name '*.sdk' -print)"

      - name: Verify compile flags before build
        run: |
          set -euo pipefail
          # ImGui 子工程必须带 C++11
          (cd libimgui && THEOS="$GITHUB_WORKSPACE/theos" gmake -n 2>&1 | tee /tmp/imgui-dryrun.log)
          grep -q -- '-std=c++11' /tmp/imgui-dryrun.log
          grep -q -- 'sources/imgui.cpp' /tmp/imgui-dryrun.log
          # 主工程 Swift 不能被注入 -std=c++11
          THEOS="$GITHUB_WORKSPACE/theos" FINALPACKAGE=1 gmake -n 2>&1 | tee /tmp/app-dryrun.log
          if grep -E 'swiftc.*-Xcc -std=c\+\+11' /tmp/app-dryrun.log; then
            echo 'swiftc must not receive -std=c++11 via -Xcc'
            exit 1
          fi
          # 主工程链接命令必须包含 libimgui 静态库
          grep -q -- 'libimgui/.theos/obj/arm64/imgui.a' /tmp/app-dryrun.log

      - name: Build tipa with Theos
        run: |
          ./gen-control.sh
          THEOS="$GITHUB_WORKSPACE/theos" FINALPACKAGE=1 gmake clean package

      - name: Upload tipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: TrollSpeed_${{ env.PKG_VERSION }}
          path: packages/TrollSpeed_*.tipa

      - name: Upload release on tag
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          files: packages/TrollSpeed_*.tipa
